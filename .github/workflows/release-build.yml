name: Build pipnest on release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-upload:
    if: github.event_name != 'release' || github.event.release.target_commitish == 'master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          BIN_NAME="pipnest"
          OUT_DIR="dist/pipnest_linux_amd64"
          mkdir -p "$OUT_DIR"
          go build -trimpath -ldflags="-s -w" -o "$OUT_DIR/$BIN_NAME" .

      - name: Create archive (tar.gz)
        run: |
          OUT_DIR="dist/pipnest_linux_amd64"
          tar -C "$OUT_DIR" -czf "dist/pipnest_linux_amd64.tar.gz" .

      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/pipnest_linux_amd64.tar.gz
